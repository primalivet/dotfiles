# General
# ------------------------------------------------------------------------------

# make windows numbering start at 1 instead of 0
set-option -g base-index 1 

# set termin var inside tmux
set-option -g default-terminal 'screen-256color'

# remove escape delay, interfears with vim
set-option -g escape-time 0

# set the prefix to Control A
set-option -g prefix C-a

# automatically renumber windows
set-option -g renumber-windows on

# use vi keybindings
set-window-option -g mode-keys vi

# make pane numbering start at 1 instead of 0
set-window-option -g pane-base-index 1

# Bindings
# ------------------------------------------------------------------------------

# split panes with | and _
bind-key '|' split-window -h
bind-key '_' split-window -v

# use v to begin selection in copy mode
bind-key -t vi-copy 'v' begin-selection

# use y to copy selection in copy mode and exit
bind-key -t vi-copy 'y' copy-selection

# resend the prefix if a is pressed after prefix, inception
bind-key a send-prefix

# when repeating prefix, switch to last window
bind-key C-a last-window

# bind r to refresh config
bind-key r source-file ~/.tmux.conf \; display 'Config Reloaded!'

# tab switches to last pane
bind-key Tab last-pane

# choose tree with everything
bind-key w choose-tree -suw

# kill window (suits me better as lowercase x kills pane)
bind-key X confirm -p 'kill window #W? (y/n)' kill-window

# move between panes like in vim
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# resize panes like splits in vim, -r flag makes it repeatable
bind-key -r '+' resize-pane -U 10
bind-key -r '-' resize-pane -D 10
bind-key -r '<' resize-pane -L 10
bind-key -r '>' resize-pane -R 10

# unbund default prefix
unbind-key C-b

# unbind default split keys
unbind-key '"'
unbind-key %

# colors
# ------------------------------------------------------------------------------

# pane numbers with prefix q
set-option -g display-panes-colour colour8
set-option -g display-panes-active-colour colour15

# command/message
set-option -g message-style 'fg=colour15,bg=colour0'
set-option -g message-command-style 'fg=colour15,bg=colour0'

# panes 
set-option -g pane-border-fg colour7
set-option -g pane-border-bg colour0
set-option -g pane-active-border-fg colour15
set-option -g pane-active-border-bg colour0

# statusline
set-option -g status-bg colour0
set-option -g status-fg colour7

# statusline contnet
set-option -g status-left '#S '
set-option -g status-right '#H %F %H:%M'

# statusline format
set-window-option -g window-status-format '#I:#W'

# statusline current color
set-window-option -g window-status-current-fg colour15

# statusline current format
set-window-option -g window-status-current-format '#I:#W'
