# Thank you Ham Vocke and Nick Nisi
# - http://www.hamvocke.com/blog/a-quick-and-easy-guide-to-tmux/
# - http://www.hamvocke.com/blog/a-guide-to-customizing-your-tmux-conf/
# - https://github.com/nicknisi/dotfiles/blob/master/tmux/tmux.conf.symlink

# make windows and pane numbers start at 1 instead of 0
set -g base-index 1 
set-window-option -g pane-base-index 1

# automatically renumber windows
set -g renumber-windows on

# unbind C-b and set it to C-a
unbind-key C-b
set -g prefix C-a
bind-key C-a send-prefix

# use vi keybindings
setw -g mode-keys vi

# make delay shorter
set -sg escape-time 0

# split panes with | and - and unbind default split keys
bind-key | split-window -h
bind-key - split-window -v
unbind-key '"'
unbind-key %

# pane movement like vim
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# pane movement like vim
bind-key H resize-pane -L 10
bind-key J resize-pane -D 10
bind-key K resize-pane -U 10
bind-key L resize-pane -R 10

# bind r to refresh config
bind-key r source-file ~/.tmux.conf \; display "Config Reloaded!"
